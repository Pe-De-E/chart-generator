version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: chart-generator-db
    environment:
      POSTGRES_USER: chartgen
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: chartgen_dev
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U chartgen']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: chart-generator-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
